name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Verify build
        run: |
          bun install --frozen-lockfile
          bun run typecheck:server
          bun run build

      - name: Resolve runner IP
        id: ip
        run: echo "ip=$(curl -fsS https://ipv4.icanhazip.com)" >> "$GITHUB_OUTPUT"

      - name: Allow runner IP on Hetzner firewall
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL_ID: ${{ secrets.HCLOUD_FIREWALL_ID }}
          ADMIN_SSH_CIDR: ${{ secrets.ADMIN_SSH_CIDR }}
          RUNNER_IP: ${{ steps.ip.outputs.ip }}
        run: |
          set -eu
          jq -n \
            --arg admin "$ADMIN_SSH_CIDR" \
            --arg runner "${RUNNER_IP}/32" \
            '{rules: [
               {description: "ssh-admin",  direction: "in", port: "22",  protocol: "tcp", source_ips: [$admin, $runner]},
               {description: "http",       direction: "in", port: "80",  protocol: "tcp", source_ips: ["0.0.0.0/0", "::/0"]},
               {description: "https",      direction: "in", port: "443", protocol: "tcp", source_ips: ["0.0.0.0/0", "::/0"]}
             ]}' > /tmp/rules.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/firewalls/${FIREWALL_ID}/actions/set_rules" \
            --data-binary @/tmp/rules.json > /dev/null

      - name: Run deploy on prod
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /opt/guess-the-tweeter/current
            sudo -u guess git pull --ff-only
            sudo -u guess bun install --frozen-lockfile
            sudo -u guess bun run typecheck:server
            sudo -u guess bun run build
            sudo systemctl restart guess-the-tweeter
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8787/healthz >/dev/null; then
                echo "healthz ok after ${i} attempt(s)"
                exit 0
              fi
              sleep 1
            done
            echo "healthz never came back" >&2
            exit 1

      - name: Restore firewall to admin-only
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL_ID: ${{ secrets.HCLOUD_FIREWALL_ID }}
          ADMIN_SSH_CIDR: ${{ secrets.ADMIN_SSH_CIDR }}
        run: |
          set -eu
          jq -n \
            --arg admin "$ADMIN_SSH_CIDR" \
            '{rules: [
               {description: "ssh-admin", direction: "in", port: "22",  protocol: "tcp", source_ips: [$admin]},
               {description: "http",      direction: "in", port: "80",  protocol: "tcp", source_ips: ["0.0.0.0/0", "::/0"]},
               {description: "https",     direction: "in", port: "443", protocol: "tcp", source_ips: ["0.0.0.0/0", "::/0"]}
             ]}' > /tmp/rules.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/firewalls/${FIREWALL_ID}/actions/set_rules" \
            --data-binary @/tmp/rules.json > /dev/null
